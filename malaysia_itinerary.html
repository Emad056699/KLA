    ];

    const weekColors = {
      1: { bg: "linear-gradient(135deg, #0D4F4F 0%, #1A6B6B 100%)", accent: "#2DD4A8", card: "#0F3D3D", glow: "rgba(45,212,168,0.12)" },
      2: { bg: "linear-gradient(135deg, #3D1F5C 0%, #5A2D82 100%)", accent: "#C084FC", card: "#2D1647", glow: "rgba(192,132,252,0.12)" },
      3: { bg: "linear-gradient(135deg, #5C3D1F 0%, #8B5E34 100%)", accent: "#FBBF24", card: "#4A3018", glow: "rgba(251,191,36,0.12)" }
    };

    const weekTitles = {
      1: "استقرار + وسط المدينة + شلالات",
      2: "جزيرة + تراث + ممرات معلّقة",
      3: "شاطئ + جبال + وداع"
    };

    const infoCards = [
      {
        icon: "🏝️",
        title: "الجزر والشواطئ",
        items: [
          "🦀 بولاو كيتام (يوم 13) — جزيرة بالقطار + قارب، بدون جواز!",
          "🏖️ بورت ديكسون (يوم 16) — أقرب شاطئ رملي (~1.5 ساعة)",
          "🏝️ بانغكور — 3.5 ساعات + فيري (تحتاج جواز للفندق)",
          "✈️ لانكاوي/رداق/بيرهنتيان — تحتاج طيران، غير ممكنة حالياً"
        ]
      },
      {
        icon: "🌿",
        title: "١٠ تجارب طبيعة في الجدول",
        items: [
          "🌳 Bukit Gasing — غابة بجانبك (يوم 2)",
          "🌉 KL Eco Park — ممر معلّق وسط المدينة (يوم 3)",
          "🦜 حديقة الطيور والفراشات (يوم 4)",
          "💧 شلالات كانشينغ 7 مستويات (يوم 6)",
          "🐒 كهوف باتو + شلال سونغاي توا (يوم 8)",
          "🌉 FRIM Skywalk — 50 متر فوق الغابة (يوم 10)",
          "🌸 حدائق بوتراجايا النباتية (يوم 12)",
          "🦀 جزيرة بولاو كيتام (يوم 13)",
          "⛰️ جنتنق — جبال + تلفريك (يوم 15)",
          "🏖️ بورت ديكسون — شاطئ + منارة (يوم 16)"
        ]
      },
      {
        icon: "📌",
        title: "ملاحظات مهمة",
        items: [
          "الفحص الطبي يوم 2 — تسليم الجواز يوم 4",
          "كل التنقلات برية — قطار LRT/KTM، Grab، باص",
          "احتفظ بنسخة الجواز + وصل التسليم دائماً",
          "Grab + Touch 'n Go = أساسيات التنقل",
          "LRT Kelana Jaya = خط مباشر لوسط المدينة",
          "الأماكن الطبيعية — روح بدري الصبح",
          "الجو حار ورطب — مظلة + مويه + واقي شمس"
        ]
      }
    ];

    let selectedWeek = 1;
    let expandedDay = null;

    function render() {
      const colors = weekColors[selectedWeek];
      const filteredDays = days.filter(d => d.week === selectedWeek);

      document.getElementById('header').style.background = colors.bg;

      document.getElementById('weekTabs').innerHTML = [1, 2, 3].map(w => `
        <button class="week-tab" data-week="${w}" style="
          border-color: ${selectedWeek === w ? weekColors[w].accent : '#181818'};
          background: ${selectedWeek === w ? weekColors[w].card : '#0D0D0D'};
          color: ${selectedWeek === w ? weekColors[w].accent : '#555'};
        ">
          <div class="emoji">${w === 1 ? '🌿' : w === 2 ? '🦀' : '🏖️'}</div>
          الأسبوع ${w}
          <div class="subtitle">${weekTitles[w]}</div>
        </button>
      `).join('');

      document.getElementById('progress').innerHTML = filteredDays.map(d => `
        <div class="progress-bar" style="background: ${expandedDay === d.day ? colors.accent : '#1A1A1A'}"></div>
      `).join('');

      document.getElementById('daysContainer').innerHTML = filteredDays.map(day => {
        const isExpanded = expandedDay === day.day;
        return `
          <div class="day-card ${isExpanded ? 'expanded' : ''}" data-day="${day.day}" style="
            background: ${isExpanded ? '#121212' : '#0A0A0A'};
            border-color: ${isExpanded ? colors.accent + '40' : '#161616'};
            box-shadow: ${isExpanded ? `0 4px 20px ${colors.glow}` : 'none'};
          ">
            <div class="day-summary">
              <div class="day-icon" style="
                background: ${isExpanded ? colors.accent + '18' : '#141414'};
                border-color: ${isExpanded ? colors.accent + '35' : '#1E1E1E'};
              ">${day.emoji}</div>
              <div class="day-content">
                <div class="day-meta">
                  <span class="day-number" style="color: ${colors.accent}">يوم ${day.day}</span>
                  <span class="day-category">${day.category}</span>
                </div>
                <div class="day-title">${day.title}</div>
              </div>
              <div class="chevron">▼</div>
            </div>
            <div class="day-details">
              <div class="highlight" style="
                background: ${colors.accent + '12'};
                border: 1px solid ${colors.accent + '28'};
                color: ${colors.accent};
              ">⭐ ${day.highlight}</div>

              ${[
                { icon: '🌅', label: 'الصباح', text: day.morning, color: '#F59E0B' },
                { icon: '🎯', label: 'الوجهة والفعالية', text: day.outing, color: colors.accent },
                { icon: '🚇', label: 'المواصلات', text: day.transport, color: '#60A5FA' }
              ].map(section => `
                <div class="section-row">
                  <div class="section-label" style="color: ${section.color}">
                    <span>${section.icon}</span>
                    <span>${section.label}</span>
                  </div>
                  <p>${section.text}</p>
                </div>
              `).join('')}

              <div class="tip-box" style="
                background: ${colors.accent + '08'};
                border: 1px dashed ${colors.accent + '28'};
              ">
                <div class="tip-label" style="color: ${colors.accent}">
                  <span>💡</span>
                  <span>نصيحة</span>
                </div>
                <p>${day.tip}</p>
              </div>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('infoCards').innerHTML = infoCards.map((card, index) => `
        <div class="info-wrap">
          <div class="info-card">
            <h3 style="color: ${colors.accent}"><span>${card.icon}</span> ${card.title}</h3>
            <div class="info-items">
              ${card.items.map(item => `<p>${index === 2 ? '• ' + item : item}</p>`).join('')}
            </div>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.week-tab').forEach(button => {
        button.addEventListener('click', () => {
          selectedWeek = Number(button.dataset.week);
          expandedDay = null;
          render();
        });
      });

      document.querySelectorAll('.day-card').forEach(card => {
        card.addEventListener('click', () => {
          const day = Number(card.dataset.day);
          expandedDay = expandedDay === day ? null : day;
          render();
        });
      });
    }

    render();
  </script>
</body>
</html>
